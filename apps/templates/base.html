<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>MiCita EPS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
{% load static %}<link rel="stylesheet" href="{% static 'css/custom.css' %}"></head>
<body><nav class="navbar navbar-expand-lg navbar-dark bg-primary"><div class="container">
<a class="navbar-brand" href="/">MiCita EPS</a>{% if user.is_authenticated %}<div class="dropdown"><button class="btn btn-light dropdown-toggle" type="button" data-bs-toggle="dropdown">{{ user.get_full_name|default:user.username }}</button>
<ul class="dropdown-menu"><li><a class="dropdown-item" href="{% url 'editar_perfil' %}">Editar perfil</a></li><li><hr class="dropdown-divider"></li><li><a class="dropdown-item" href="{% url 'logout' %}">Cerrar sesión</a></li></ul></div>{% endif %}
</div></nav><div class="container mt-3">{% if messages %}{% for message in messages %}<div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">{{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>{% endfor %}{% endif %}
{% block content %}{% endblock %}</div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/notificaciones.js' %}"></script></body></html>
