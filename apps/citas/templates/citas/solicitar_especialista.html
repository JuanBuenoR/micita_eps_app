{% extends "base.html" %}
{% block content %}<h3>Solicitar cita con especialista</h3>
<form method="post">{% csrf_token %}<div class="mb-2"><label>Especialidad</label><input type="text" name="especialidad" class="form-control" required></div>
<div class="mb-2"><label>Motivo</label><textarea name="motivo" class="form-control" rows="3" required></textarea></div>
<button type="submit" class="btn btn-primary">Enviar</button><a href="{% url 'citas:medico_dashboard' %}" class="btn btn-secondary">Cancelar</a></form>{% endblock %}
