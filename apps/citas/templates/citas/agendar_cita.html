{% extends "base.html" %}
{% block content %}<h3>Agendar cita de medicina general</h3>
<form method="post">{% csrf_token %}
<div class="mb-2"><label>Médico</label><select name="medico" class="form-control" required>{% for m in medicos %}<option value="{{ m.id }}">Dr. {{ m.user.get_full_name }} - {{ m.especialidad }}</option>{% endfor %}</select></div>
<div class="mb-2"><label>Fecha</label><input type="date" name="fecha" class="form-control" required></div>
<div class="mb-2"><label>Hora</label><input type="time" name="hora" class="form-control" required></div>
<button type="submit" class="btn btn-primary">Agendar</button><a href="{% url 'citas:paciente_dashboard' %}" class="btn btn-secondary">Cancelar</a>
</form>{% endblock %}
